<!DOCTYPE html>
<!-- <script src="https://cdn.jsdelivr.net/gh/alpinejs/alpine@v2.x.x/dist/alpine.min.js" defer></script>  Alpine.JS -->
<link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">  <!-- Tailwind CSS -->
<html>
  <title>Login</title>
    <style>
        body {
          background-image: url('people.jpg');
          background-repeat: no-repeat;
          background-attachment: fixed;
          background-size: 100% 100%;
        }
        </style>
        <script>
            function success(){
                alert("You have successfully logged in!");
            }
        </script>
    <body>
        <center>
          <div class="topnav text-lg">
            <a class="active ml-5 mr-5 hover:text-gray-500" href="https://nickyfr33ze.github.io/final/index.html">Home</a>
            <a class="ml-5 mr-5 hover:text-gray-500" href="https://nickyfr33ze.github.io/final/stock/index.html">Stocks</a>
            <a class="ml-5 mr-5 hover:text-gray-500" href="https://nickyfr33ze.github.io/final/crypto/index.html">Crypto</a>
            <a class="ml-5 mr-5 hover:text-gray-500" href="https://nickyfr33ze.github.io/final/account/index.html">Account</a>
            <a class="ml-5 mr-5 hover:text-gray-500" href="https://nickyfr33ze.github.io/final/contactUs/index.html">Contact Us</a>
        </div>
        </center>
        <div class="text-3xl mt-24">
            Login:
        </div>
        <div class="shadow-md rounded px-8 pt-6 pb-8 mb-4 flex flex-col">
            <div class="mb-4">
              <label class="block text-grey-darker text-sm font-bold mb-2" for="email">
            Email
              </label>
              <input class="shadow appearance-none border rounded w-full py-2 px-3 text-grey-darker" id="email" type="text" placeholder="Email">
            </div>
            <div class="mb-6">
              <label class="block text-grey-darker text-sm font-bold mb-2" for="password">
                Password
              </label>
              <input class="shadow appearance-none border border-red rounded w-full py-2 px-3 text-grey-darker mb-3" id="password" type="password" placeholder="******************">
              <p class="text-red text-xs italic">Please choose a password.</p>
            </div>
            <div class="flex items-center justify-between">
              <button class="bg-blue-100 hover:bg-blue-200 border-2 border-blue-200 text-blue-400 hover:text-blue-500 font-bold py-2 px-4 rounded" type="button" onclick=success()>
                Sign In
              </button>
              <a class="inline-block align-baseline font-bold text-sm text-blue hover:text-blue-darker" href="#">
                Forgot Password?
              </a>
            </div>
        </div>

    </body>
</html>
