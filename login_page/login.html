<!DOCTYPE html> 
  <head>
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
        <title> Login </title>
  </head>
  <body>
    <div class="bg-gradient-to-b from-green-400 text-green-700 cursor-text text-center justify-center font-mono text-5xl rounded-b-lg container mx-auto space-y-4">
      Nick's Login Page
    </div>
      <div>
        <h1 class="text-left text-2xl font-light text-green-700 underline ">Login to our Website</h1>
        <div>
            <div>
                <label class="font-mono text-green-700">Username or Email:</label>
                <input type="text" placeholder="Your Username">
            </div>
            <div>
                <label class="font-mono text-green-700">Password:</label>
                <input type="text" placeholder="Your Password">
                
            </div>
            <div>
                <button class="bg-blue-200 text-blue-600 border-2 border-blue-400 hover:border-blue-700 hover:bg-blue-300 rounded-md">Login</button><a href="#" class="text-blue-500 underline">   Forgot Password?</a>
                <div>
                  <p>Don't have an account? <a href="#" class="text-blue-500 underline ">Create an Account</a>!</p>
                </div>
            </div>
        </div>
      </div>
  </body>
</html>
